---
- name: Deploy SMAK‑AM and ensure scheduled task
  hosts: windows
  gather_facts: false
  collections:
    - ansible.windows
  vars:
    toolroot: 'C:\Program Files\SMAK-AM'
    task_name: 'SMAK_AM'
    batch_file: '{{ toolroot }}\run-smack-am.bat'

  tasks:

    - name: Copy SMAK‑AM toolset to host
      win_copy:
        src: files/smack-am/
        dest: '{{ toolroot }}\'
        remote_src: yes
        force: no   # only copy when source is newer

    - name: Verify that the entry batch file exists
      win_stat:
        path: '{{ batch_file }}'
      register: batch_stat

    - name: Create daily SMAK‑AM scheduled task (only if batch present)
      win_command: >
        schtasks /Create /TN "{{ task_name }}"
        /TR "C:\Windows\System32\cmd.exe /c \"{{ batch_file }}\""
        /SC DAILY /ST 00:01 /RU SYSTEM /RL HIGHEST /F
      when: batch_stat.stat.exists